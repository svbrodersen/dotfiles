unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind v split-window -h -c "#{pane_current_path}"  # Split right
bind s split-window -v -c "#{pane_current_path}"  # Split down
bind x kill-pane                                  # Close pane
bind z resize-pane -Z                             # Toggle fullscreen/frames (zoom)

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

bind - kill-window                                # Close Tab

bind 1 select-window -t :=1
bind 2 select-window -t :=2
bind 3 select-window -t :=3
bind 4 select-window -t :=4
bind 5 select-window -t :=5
bind 6 select-window -t :=6
bind 7 select-window -t :=7
bind 8 select-window -t :=8
bind 9 select-window -t :=9

set -g mouse on                                   # Enable mouse mode
set -g history-limit 10000                        # Scroll buffer size

set-window-option -g mode-keys vi

set -g status-bg black
set -g status-fg white
set -g status-style bg=default

# ==========================================
# 6. PLUGINS
# ==========================================
# Hit Prefix + I to fetch these plugins after reloading tmux
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'alexwforsythe/tmux-which-key'

run '~/.tmux/plugins/tpm/tpm'
