import = ["~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"]

[window]
startup_mode = 'Maximized'
dynamic_padding = true
decorations = 'full'
opacity = 0.96

[window.padding]
x = 6
y = 0

[font]
size = 11

[font.offset]
x = 0
y = 0

[font.normal]
family = 'IntoneMono Nerd Font Mono'

[scrolling]
history = 1000
