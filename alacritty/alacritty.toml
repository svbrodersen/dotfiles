import = ["./themes/themes/kanagawa_dragon.toml"]

[window]
startup_mode = 'Maximized'
dynamic_padding = true
decorations = 'full'
opacity = 0.97

[window.padding]
x = 6
y = 0

[font]
size = 11

[font.offset]
x = 0
y = 0

[font.normal]
family = 'FiraCode Nerd Font Mono'

[scrolling]
history = 1000

[env]
term = "xterm-256color"
